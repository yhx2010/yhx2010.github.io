<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>妈妈，母亲节快乐 💐</title>
    <style>
        :root {
            --rose: #e8c4c4;
            --rose-deep: #c97d7d;
            --cream: #fdf6f0;
            --brown: #5d4037;
            --soft-brown: #8d6e63;
            --shadow-soft: 0 4px 20px rgba(120, 80, 60, 0.12);
            --shadow-medium: 0 8px 32px rgba(100, 60, 40, 0.18);
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', serif;
            --font-script: 'Georgia', 'KaiTi', '楷体', serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-serif);
            background: #fdf6f0;
            color: #4a3228;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
            position: fixed;
            top: 0;
            left: 0;
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            z-index: 1000;
            background: radial-gradient(ellipse at center, #fef6f0 0%, #f5e6d8 40%, #e8d5c8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4a574;
            border-radius: 50%;
            animation: sparkleFloat 4s infinite ease-in-out;
            opacity: 0;
        }
        @keyframes sparkleFloat {
            0%,
            100% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }
            15% {
                opacity: 0.9;
            }
            50% {
                opacity: 0.3;
                transform: translateY(-60px) scale(1.8);
            }
            85% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
                transform: translateY(-110px) scale(0.3);
            }
        }
        .envelope-wrapper {
            position: relative;
            z-index: 2;
            animation: envelopeFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 28px rgba(130, 80, 60, 0.25));
        }
        @keyframes envelopeFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-14px);
            }
        }
        .envelope {
            width: 160px;
            height: 110px;
            border-radius: 8px;
            position: relative;
            background: linear-gradient(145deg, #f9e4d4 0%, #f2d4c0 40%, #e8c8b0 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5), 0 6px 24px rgba(100, 60, 30, 0.25);
        }
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            z-index: 3;
            background: linear-gradient(170deg, #f5dcc8 0%, #ecc8a8 50%, #e0b890 100%);
            border-radius: 8px 8px 0 0;
            clip-path: polygon(0 0, 50% 75%, 100% 0);
            transform-origin: top center;
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .envelope-flap.open {
            transform: rotateX(180deg);
        }
        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            z-index: 1;
            background: linear-gradient(180deg, #f7e0ce 0%, #f0d2ba 100%);
            border-radius: 0 0 8px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .envelope-seal {
            width: 36px;
            height: 36px;
            background: #d4867c;
            border-radius: 50%;
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .envelope-seal.fade-out {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.4);
        }
        .intro-hint {
            margin-top: 28px;
            z-index: 2;
            font-size: 1.05rem;
            color: #8d6e63;
            letter-spacing: 0.06em;
            animation: hintPulse 2s infinite;
            font-family: var(--font-script);
        }
        @keyframes hintPulse {
            0%,
            100% {
                opacity: 0.55;
            }
            50% {
                opacity: 1;
            }
        }
        .intro-title-main {
            z-index: 2;
            font-size: 1.6rem;
            color: #5d4037;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-family: var(--font-script);
            font-weight: bold;
        }

        .petal {
            position: fixed;
            z-index: 1001;
            pointer-events: none;
            font-size: 22px;
            animation: petalFall linear forwards;
            opacity: 0;
        }
        @keyframes petalFall {
            0% {
                opacity: 0;
                transform: translate(0, -40px) rotate(0deg) scale(0.5);
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translate(var(--drift), 105vh) rotate(var(--spin)) scale(1.3);
            }
        }

        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(180, 140, 120, 0.4);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(120, 80, 60, 0.12);
            transition: all 0.3s;
            backdrop-filter: blur(6px);
            -webkit-tap-highlight-color: transparent;
        }
        .music-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: scale(1.05);
        }
        .music-btn.playing {
            border-color: #c97d7d;
            background: rgba(253, 240, 235, 0.9);
        }

        .swiper-container {
            width: 100vw;
            width: 100dvw;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .swiper-wrapper {
            display: flex;
            width: calc(100vw * 2);
            width: calc(100dvw * 2);
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .swiper-slide {
            width: 100vw;
            width: 100dvw;
            height: 100vh;
            height: 100dvh;
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 16px;
            position: relative;
            max-width: 100vw;
            max-width: 100dvw;
        }

        @supports (-webkit-touch-callout: none) {
            .swiper-slide {
                height: 100vh;
                height: 100dvh;
            }
        }

        .page-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 998;
            display: flex;
            gap: 12px;
        }
        .page-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(180, 140, 120, 0.4);
            transition: all 0.4s;
            cursor: pointer;
        }
        .page-dot.active {
            background: #c97d7d;
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(201, 125, 125, 0.5);
        }

        .swipe-hint {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: rgba(180, 140, 120, 0.5);
            animation: swipeHint 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }
        .swipe-hint.last {
            display: none;
        }
        @keyframes swipeHint {
            0%,
            100% {
                transform: translateY(-50%) translateX(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-50%) translateX(10px);
                opacity: 0.8;
            }
        }

        /* 页面1：胶片 */
        .slide-film {
            background: radial-gradient(circle at 30% 30%, rgba(232, 196, 196, 0.15) 0%, transparent 55%),
                radial-gradient(circle at 70% 70%, rgba(212, 167, 116, 0.18) 0%, transparent 55%);
            background-color: #fdf6f0;
            gap: 20px;
            justify-content: flex-start;
            padding-top: 80px;
        }
        .film-title {
            font-size: 1.3rem;
            color: #5d4037;
            letter-spacing: 0.06em;
            font-family: var(--font-script);
            text-align: center;
            flex-shrink: 0;
        }
        .film-stage {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, auto);
            gap: 12px;
            padding: 10px;
            flex-shrink: 0;
        }
        .film-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #8d6e63;
            opacity: 0.8;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }
        .replay-btn {
            padding: 8px 24px;
            font-size: 0.9rem;
            color: #fff;
            background: #c97d7d;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font-script);
            letter-spacing: 0.06em;
            box-shadow: 0 4px 20px rgba(120, 80, 60, 0.12);
            transition: all 0.4s;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            flex-shrink: 0;
        }
        .replay-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .replay-btn:hover {
            background: #b86868;
        }

        .film-frame {
            position: relative;
            width: 100%;
            max-width: 150px;
            margin: 0 auto;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            -webkit-tap-highlight-color: transparent;
            transform-origin: center center;
            aspect-ratio: 3/4;
        }
        .film-frame.present {
            opacity: 1;
            transform: scale(1);
        }
        .film-frame.revealed {
            cursor: default;
            pointer-events: none;
        }
        .film-frame.present:not(.revealed) {
            animation: frameGlow 2s ease-in-out infinite;
        }
        @keyframes frameGlow {
            0%,
            100% {
                filter: brightness(1) drop-shadow(0 0 4px rgba(220, 180, 120, 0.3));
            }
            50% {
                filter: brightness(1.15) drop-shadow(0 0 14px rgba(220, 180, 120, 0.6));
            }
        }

        .frame-outer {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #2c2c2c;
            border-radius: 3px;
            padding: 8px 5px 8px 5px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
            overflow: visible;
        }
        .frame-outer::before,
        .frame-outer::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 7px;
            z-index: 3;
            pointer-events: none;
        }
        .frame-outer::before {
            top: -7px;
            background: repeating-linear-gradient(90deg,
                    transparent 0px, transparent 4px, #1a1a1a 4px, #1a1a1a 6px,
                    transparent 6px, transparent 10px);
            border-radius: 2px 2px 0 0;
        }
        .frame-outer::after {
            bottom: -7px;
            background: repeating-linear-gradient(90deg,
                    transparent 0px, transparent 4px, #1a1a1a 4px, #1a1a1a 6px,
                    transparent 6px, transparent 10px);
            border-radius: 0 0 2px 2px;
        }
        .frame-outer.scrolling-teeth::before,
        .frame-outer.scrolling-teeth::after {
            animation: teethScroll 0.3s linear infinite;
        }
        @keyframes teethScroll {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: -10px 0;
            }
        }

        .frame-inner {
            background: #1a1a1a;
            border-radius: 1px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .frame-img {
            width: 100%;
            flex: 1;
            object-fit: cover;
            display: block;
            background: #3a3030;
            min-height: 80px;
        }
        .frame-placeholder {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2222;
            color: #c9a87c;
            font-size: 1.6rem;
            font-family: var(--font-serif);
            min-height: 80px;
        }
        .frame-caption {
            padding: 5px 6px;
            font-size: 0.6rem;
            color: #e0d5c8;
            text-align: center;
            font-family: var(--font-script);
            letter-spacing: 0.04em;
            background: #222;
            line-height: 1.3;
            min-height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .click-dot {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #ffd700;
            font-family: var(--font-script);
            animation: hintPulse 1.5s infinite;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
        }
        .film-frame.revealed .click-dot {
            display: none;
        }

        /* 页面2：贺卡 */
        .slide-card {
            background: radial-gradient(circle at 40% 60%, rgba(232, 196, 196, 0.15) 0%, transparent 55%);
            background-color: #fdf6f0;
            gap: 16px;
        }
        .card-section-title {
            font-size: 1.2rem;
            color: #5d4037;
            letter-spacing: 0.06em;
            font-family: var(--font-script);
            text-align: center;
        }
        .card-envelope-outer {
            perspective: 1200px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card-envelope-container {
            width: 260px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .card-envelope-container.lifted {
            transform: translateY(-20px);
        }
        .card-envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(160deg, #f9e8dc 0%, #f2d8c4 40%, #e8c8ae 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(100, 60, 40, 0.18);
            border: 1px solid rgba(200, 160, 130, 0.3);
            transition: opacity 0.5s;
        }
        .card-envelope-front.fading {
            opacity: 0;
            pointer-events: none;
        }
        .card-envelope-flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            z-index: 4;
            background: linear-gradient(175deg, #f5dcc8 0%, #ecc8a8 50%, #ddb890 100%);
            border-radius: 12px 12px 0 0;
            clip-path: polygon(0 0, 50% 80%, 100% 0);
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .card-envelope-flap-top.open {
            transform: rotateX(185deg);
        }
        .card-envelope-seal-round {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 34px;
            height: 34px;
            background: #d4867c;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #fff;
            transition: all 0.5s;
        }
        .card-envelope-seal-round.hidden-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.3);
        }
        .card-inside {
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            bottom: 8px;
            background: #fffefb;
            border-radius: 8px;
            z-index: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s;
            transform: translateY(0);
            opacity: 0.7;
        }
        .card-inside.emerging {
            transform: translateY(-45px);
            opacity: 1;
            z-index: 3;
            box-shadow: 0 8px 32px rgba(100, 60, 40, 0.18);
        }
        .card-inside-greeting {
            font-family: var(--font-script);
            font-size: 0.95rem;
            color: #5d4037;
            letter-spacing: 0.04em;
            line-height: 1.7;
        }
        .card-inside-signature {
            margin-top: 10px;
            font-family: var(--font-script);
            color: #c97d7d;
            font-size: 0.85rem;
        }
        .card-hint-click {
            text-align: center;
            font-size: 0.8rem;
            color: #8d6e63;
            opacity: 0.7;
            animation: hintPulse 2.5s infinite;
        }

        .surprise-btn {
            display: inline-block;
            padding: 8px 18px;
            font-size: 0.85rem;
            color: #c9b8a8;
            background: transparent;
            border: 1px solid rgba(180, 150, 130, 0.25);
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.4s;
            opacity: 0.6;
            -webkit-tap-highlight-color: transparent;
            margin-top: 8px;
        }
        .surprise-btn.highlight {
            opacity: 1;
            border-color: #c97d7d;
            color: #c97d7d;
            background: rgba(201, 125, 125, 0.08);
            box-shadow: 0 0 12px rgba(201, 125, 125, 0.3);
            animation: surprisePulse 1.5s ease-in-out infinite;
        }
        @keyframes surprisePulse {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(201, 125, 125, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(201, 125, 125, 0.5);
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: rgba(60, 30, 20, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
            cursor: pointer;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-dialog {
            background: #fffefb;
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            max-width: 340px;
            width: 85%;
            box-shadow: 0 20px 50px rgba(80, 40, 20, 0.3);
            animation: modalIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes modalIn {
            from {
                transform: translateY(30px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .modal-emoji {
            font-size: 45px;
            margin-bottom: 14px;
        }
        .modal-text {
            font-family: var(--font-script);
            font-size: 1.2rem;
            color: #5d4037;
            letter-spacing: 0.06em;
        }
        .modal-close {
            display: inline-block;
            margin-top: 18px;
            padding: 8px 24px;
            background: #c97d7d;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: #b86868;
        }

        .doc-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2100;
            background: rgba(60, 30, 20, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            cursor: pointer;
        }
        .doc-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .doc-modal-dialog {
            background: #fffefb;
            border-radius: 16px;
            padding: 35px 28px;
            width: 85vw;
            height: 80vh;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(80, 40, 20, 0.35);
            position: relative;
            cursor: default;
            animation: docModalIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
            border: 1px solid rgba(200, 160, 130, 0.3);
        }
        @keyframes docModalIn {
            from {
                transform: translateY(40px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .doc-modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(200, 160, 140, 0.2);
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #8d6e63;
            display: flex;
            align-items: center;

    <script>

            function setMobileViewport() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);

                document.documentElement.style.setProperty('--vw', `${vw}px`);

                setTimeout(() => {
                    setMobileViewport();
                    swiperWrapper.style.transform = `translateX(-${currentPage * 100}vw)`;
                }, 100);

            let touchStartX = 0;
            let touchStartY = 0;

            function goToPage(index) {
                if (index < 0 || index >= totalPages || isTransitioning) return;
                isTransitioning = true;
                currentPage = index;
                swiperWrapper.style.transform = `translateX(-${currentPage * 100}vw)`;
                updateDots();
                document.querySelectorAll('.swipe-hint').forEach((hint, i) => {
                    hint.classList.toggle('last', i === totalPages - 1);
                });
                setTimeout(() => { isTransitioning = false; }, 500);
            }

            function updateDots() {
                pageDots.forEach(dot => {
                    dot.classList.toggle('active', parseInt(dot.dataset.page) === currentPage);
                });
            }

            swiperContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            swiperContainer.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    if (dx < -30) goToPage(currentPage + 1);
                    else if (dx > 30) goToPage(currentPage - 1);
                }
            });

            swiperContainer.addEventListener('wheel', (e) => {
                if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
                if (e.deltaY > 30) goToPage(currentPage + 1);
                else if (e.deltaY < -30) goToPage(currentPage - 1);
            }, { passive: true });

            pageDots.forEach(dot => {
                dot.addEventListener('click', () => goToPage(parseInt(dot.dataset.page)));
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') goToPage(currentPage + 1);
                if (e.key === 'ArrowLeft') goToPage(currentPage - 1);
            });

            // ==================== 胶片逻辑（3x3网格） ====================
            const filmData = [
                { src: "1.jpg",
                    caption: "", emoji: "" },
                { src: "2.jpg",
                    caption: "", emoji: "" },
                { src: "3.jpg",
                    caption: "", emoji: "" },
                { src: "4.jpg",
                    caption: "", emoji: "" },
                { src: "5.jpg",
                    caption: "", emoji: "" },
                { src: "6.jpg",
                    caption: "", emoji: "" },
                { src: "7.jpg",
                    caption: "", emoji: "" },
                { src: "8.jpg",
                    caption: "", emoji: "" },
                { src: "9.jpg",
                    caption: "", emoji: "" }
            ];

            let allFrames = [];
            let currentTrail = 0;
            let revealedInTrail = [0, 0, 0];

            function createFilmGrid() {
                filmStage.innerHTML = '';
                allFrames = [];

                for (let i = 0; i < 9; i++) {
                    const data = filmData[i];
                    const trail = Math.floor(i / 3);
                    const frame = document.createElement('div');
                    frame.className = 'film-frame';
                    frame.dataset.index = i;
                    frame.dataset.trail = trail;
                    frame.dataset.revealed = 'false';
                    frame.style.opacity = '0';
                    frame.style.transform = 'scale(0.5)';

                    const outer = document.createElement('div');
                    outer.className = 'frame-outer';
                    const inner = document.createElement('div');
                    inner.className = 'frame-inner';

                    const img = document.createElement('img');
                    img.className = 'frame-img';
                    img.src = data.src;
                    img.alt = data.caption;
                    img.onerror = function() {
                        this.style.display = 'none';
                        const ph = document.createElement('div');
                        ph.className = 'frame-placeholder';
                        ph.textContent = data.emoji;
                        inner.insertBefore(ph, inner.firstChild);
                    };

                    const caption = document.createElement('div');
                    caption.className = 'frame-caption';
                    caption.textContent = data.caption;

                    inner.appendChild(img);
                    inner.appendChild(caption);
                    outer.appendChild(inner);
                    frame.appendChild(outer);

                    const dot = document.createElement('span');
                    dot.className = 'click-dot';
                    dot.textContent = '👆 点击';
                    frame.appendChild(dot);

                    frame.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleFrameClick(frame, trail);
                    });

                    filmStage.appendChild(frame);
                    allFrames.push(frame);
                }
            }

            function showRow(trailIndex) {
                const startIdx = trailIndex * 3;
                const endIdx = startIdx + 3;

                for (let i = startIdx; i < endIdx; i++) {
                    const frame = allFrames[i];
                    if (frame.dataset.revealed === 'true') continue;

                    setTimeout(() => {
                        frame.classList.add('present');
                        frame.style.opacity = '1';
                        frame.style.transform = 'scale(1)';

                        const outer = frame.querySelector('.frame-outer');
                        if (outer) {
                            outer.classList.add('scrolling-teeth');
                            setTimeout(() => outer.classList.remove('scrolling-teeth'), 1800);
                        }
                    }, (i - startIdx) * 300);
                }

                filmHint.textContent = `✨ 第${trailIndex + 1}行回忆展开中…点击闪烁的胶片 ✨`;
            }

            function handleFrameClick(frame, trailIndex) {
                if (trailIndex !== currentTrail) {
                    shakeFrame(frame);
                    return;
                }
                if (frame.dataset.revealed === 'true') return;

                revealFrame(frame);
                revealedInTrail[trailIndex]++;

                if (revealedInTrail[trailIndex] >= 3) {
                    setTimeout(() => advanceToNextRow(), 1000);
                }
            }

            function revealFrame(frame) {
                frame.dataset.revealed = 'true';
                frame.classList.add('revealed');
                frame.classList.remove('present');
                frame.style.transform = 'scale(1)';
                const outer = frame.querySelector('.frame-outer');
                if (outer) outer.classList.remove('scrolling-teeth');
                spawnPetals(3);
            }

            function shakeFrame(frame) {
                const orig = frame.style.transform;
                frame.style.transition = 'transform 0.1s ease';
                frame.style.transform = 'translateX(-8px)';
                setTimeout(() => { frame.style.transform = 'translateX(8px)'; }, 100);
                setTimeout(() => { frame.style.transform = orig;
                    frame.style.transition = ''; }, 200);
            }

            function advanceToNextRow() {
                if (currentTrail < 2) {
                    currentTrail++;
                    showRow(currentTrail);
                } else {
                    filmHint.textContent = '💝 所有回忆都已珍藏';
                    replayBtn.classList.add('show');
                    spawnPetals(18);
                }
            }

            function startFirstRow() {
                currentTrail = 0;
                revealedInTrail = [0, 0, 0];
                replayBtn.classList.remove('show');

                allFrames.forEach(frame => {
                    frame.dataset.revealed = 'false';
                    frame.classList.remove('revealed', 'present');
                    frame.style.opacity = '0';
                    frame.style.transform = 'scale(0.5)';
                    const outer = frame.querySelector('.frame-outer');
                    if (outer) outer.classList.remove('scrolling-teeth');
                });

                setTimeout(() => showRow(0), 400);
            }

            replayBtn.addEventListener('click', () => {
                startFirstRow();
                spawnPetals(8);

                const emojis = ['🌸', '💮', '🌷', '🌺', '💐', '🌼', '🌻', '🪷', '✿', '❀'];

高一大病时，当你听到"要住院"三个字时的揪心，支付的果断，我明白，你总是在种种细节中表达无声的爱。在病床上，你关心的言语无意是最好的证明。你每天提前下班就往医院跑，带饮料，带吃的，与医生交谈，与我谈论运动会的事情。遇到问题，你也会立马给出方案，还记得生病期间唯一一次单发的消息是"好好休息，别担心"。我退烧那天，你拿着出院报告单，看着你憔悴的脸，才懂你所有的坚强都是为我撑起的伞。

时间来到高一下学期，学考与统考的压力促使我启动备考计划。每天大强度的学习中，也能提到电话另一头传来的"加油，我相信你"。你知道我的性格，尊重我的安排，在考试失利时给与鼓励与激励......你的支持将会转化为学习路上的最大动力。

            function prepareDocContent() {
                docContent.innerHTML = '';
                docChars = docFullText.split('');
                docCharIndex = 0;
            }

            function typeNextChar() {
                if (docCharIndex < docChars.length) {
                    const span = document.createElement('span');
                    span.className = 'char';
                    span.textContent = docChars[docCharIndex];
                    docContent.appendChild(span);
                    docCharIndex++;
                    docTypingTimer = setTimeout(typeNextChar, 40);
                }
            }

            function showAllText() {
                if (docTypingTimer) { clearTimeout(docTypingTimer);
                    docTypingTimer = null; }
                if (docCharIndex < docChars.length) {
                    docContent.innerHTML = docFullText;
                    docCharIndex = docChars.length;
                }
            }

            function openDocModal() {
                docModalOverlay.classList.add('active');
                prepareDocContent();
                if (!hasTypingPlayed) {
                    hasTypingPlayed = true;
                    setTimeout(() => { typeNextChar(); }, 300);
                } else {
                    docContent.innerHTML = docFullText;
                    docCharIndex = docChars.length;
                }
            }

            function closeDocModal() {
                docModalOverlay.classList.remove('active');
                if (docTypingTimer) { clearTimeout(docTypingTimer);
                    docTypingTimer = null; }
                surpriseBtn.classList.add('highlight');
                cardEnvelopeOuter.removeEventListener('click', openCard);
                cardEnvelopeOuter.addEventListener('click', () => {
                    if (isCardOpened) { openDocModal(); }
                });
            }

            docModalCloseBtn.addEventListener('click', (e) => { e.stopPropagation();
                closeDocModal(); });
            docModalOverlay.addEventListener('click', (e) => { if (e.target === docModalOverlay) closeDocModal(); });
            docModalDialog.addEventListener('click', (e) => {
                if (e.target.closest('.doc-modal-close')) return;
                showAllText();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && docModalOverlay.classList.contains('active')) closeDocModal();
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) modalOverlay.classList.remove(
                    'active');
            });

            createFilmGrid();
            loadDocText();

                    setTimeout(() => {
